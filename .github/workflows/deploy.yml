name: Deploy para GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar firebase-config.js a partir dos Secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          # Só sobrescreve se os secrets estiverem configurados
          if [ -n "$FIREBASE_API_KEY" ]; then
            echo "Gerando firebase-config.js a partir dos Secrets..."
            printf 'const FIREBASE_CONFIG = {\n  apiKey: "%s",\n  authDomain: "%s",\n  databaseURL: "%s",\n  projectId: "%s",\n  storageBucket: "%s",\n  messagingSenderId: "%s",\n  appId: "%s",\n};\n' \
              "$FIREBASE_API_KEY" \
              "$FIREBASE_AUTH_DOMAIN" \
              "$FIREBASE_DATABASE_URL" \
              "$FIREBASE_PROJECT_ID" \
              "$FIREBASE_STORAGE_BUCKET" \
              "$FIREBASE_MESSAGING_SENDER_ID" \
              "$FIREBASE_APP_ID" > firebase-config.js
            echo "firebase-config.js gerado com sucesso."
          else
            echo "Secrets não configurados — usando firebase-config.js do repositório."
          fi

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Fazer upload dos arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
